version: "3.8"

services:
  # Local Ethereum node (for dev/test clouds — start with --profile dev)
  ganache:
    image: trufflesuite/ganache:latest
    command: --wallet.totalAccounts 10 --wallet.defaultBalance 1000 --port 8545
    profiles:
      - dev
    ports:
      - "8545:8545"
    networks:
      - veil-net

  # Canteen backend node
  canteen-node-1:
    build:
      context: ./canteen
      dockerfile: Dockerfile
    environment:
      - ACTIVE_CHAIN=filecoin
      - FIL_RPC_URL=https://api.calibration.node.glif.io/rpc/v1
      - FIL_CONTRACT_ADDRESS=0x04dEf60e2853E4d654b366cd8103F929c456d4b7
      - PORT=5000
      - WEB_PORT=5001
      - NODE_ENV=development
      - DOCKER_SOCKET=/var/run/docker.sock
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - veil-net

  # Dashboard (React frontend)
  dashboard:
    build:
      context: ./canteen/dashboard
      dockerfile: Dockerfile
    depends_on:
      - canteen-node-1
    environment:
      - REACT_APP_CLUSTER_URL=http://canteen-node-1:5001/cluster
      - REACT_APP_FIL_RPC_URL=https://api.calibration.node.glif.io/rpc/v1
      - REACT_APP_FIL_CONTRACT_ADDRESS=0x04dEf60e2853E4d654b366cd8103F929c456d4b7
      - REACT_APP_FIL_CHAIN_ID=314159
    ports:
      - "3000:3000"
    networks:
      - veil-net

networks:
  veil-net:
    driver: bridge
