name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: canteen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm audit --omit=dev || true
      - run: |
          npx ganache --port 8545 --deterministic &
          sleep 5
          npx truffle test --config truffle-config.cjs test/canteen_test.js
          kill %1 2>/dev/null || true

  compose:
    name: Docker compose build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
