name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Contract tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: canteen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: canteen/package-lock.json
      - run: npm install
      - run: npx truffle test --config truffle-config.cjs
